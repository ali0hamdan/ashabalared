# Optional local PostgreSQL only — not required for Neon / Supabase / Railway Postgres.
services:
  db:
    image: postgres:16-alpine
    container_name: relief-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: relief_db
    ports:
      - '5432:5432'
    volumes:
      - relief_pgdata:/var/lib/postgresql/data

volumes:
  relief_pgdata:
